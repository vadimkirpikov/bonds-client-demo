services:
  mongo:
    image: mongo:7.0
    container_name: bonds-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db

  bonds-client:
    image: vadimkirpikov/bonds-client-new
    container_name: bonds-client
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
        NEXT_PUBLIC_LEGAL_FIO: ${NEXT_PUBLIC_LEGAL_FIO}
        NEXT_PUBLIC_LEGAL_INN: ${NEXT_PUBLIC_LEGAL_INN}
        NEXT_PUBLIC_LEGAL_EMAIL: ${NEXT_PUBLIC_LEGAL_EMAIL}
        NEXT_PUBLIC_YANDEX_METRIKA_ID: ${NEXT_PUBLIC_YANDEX_METRIKA_ID}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
    environment:
      MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/bonds-lab?authSource=admin
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      API_PUBLIC_EMAIL: ${API_PUBLIC_EMAIL}
      API_PUBLIC_PASSWORD: ${API_PUBLIC_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXT_PUBLIC_LEGAL_FIO: ${NEXT_PUBLIC_LEGAL_FIO}
      NEXT_PUBLIC_LEGAL_INN: ${NEXT_PUBLIC_LEGAL_INN}
      NEXT_PUBLIC_LEGAL_EMAIL: ${NEXT_PUBLIC_LEGAL_EMAIL}
      NEXT_PUBLIC_YANDEX_METRIKA_ID: ${NEXT_PUBLIC_YANDEX_METRIKA_ID}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
      GUEST_TOKEN: ${GUEST_TOKEN}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - mongo

  bonds-client-nginx:
    image: nginx:1.29
    container_name: bonds-client-nginx
    restart: always
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - bonds-client
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/bonds-lab.ru/fullchain.pem:/etc/nginx/certs/bonds-lab.crt:ro
      - /etc/letsencrypt/live/bonds-lab.ru/privkey.pem:/etc/nginx/certs/bonds-lab.key:ro

volumes:
  mongo-data: