name: Build and Push docker images

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Service
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bonds-client-new:latest
            ${{ secrets.DOCKER_USERNAME }}/bonds-client-new:${{ github.sha }}
          # ПРОКИДЫВАЕМ ВСЕ NEXT_PUBLIC ПЕРЕМЕННЫЕ НА ЭТАПЕ СБОРКИ
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_LEGAL_FIO=${{ secrets.NEXT_PUBLIC_LEGAL_FIO }}
            NEXT_PUBLIC_LEGAL_INN=${{ secrets.NEXT_PUBLIC_LEGAL_INN }}
            NEXT_PUBLIC_LEGAL_EMAIL=${{ secrets.NEXT_PUBLIC_LEGAL_EMAIL }}
            NEXT_PUBLIC_YANDEX_METRIKA_ID=${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}
            NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Переходим в папку app
            cd ~/app || exit 1
            
            
            # Подтягиваем свежие образы
            docker compose pull bonds-client
            docker compose up -d --force-recreate bonds-client